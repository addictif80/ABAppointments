<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ABPanel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                        dark: { 700: '#374151', 800: '#1f2937', 900: '#111827', 950: '#0d1117' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .sidebar-link.active { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; border-left: 3px solid #3b82f6; }
        .sidebar-link:hover { background-color: rgba(59, 130, 246, 0.1); }
        .stat-card { transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .progress-bar { transition: width 0.6s ease; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-dark-950 text-gray-200">
    {% block body %}{% endblock %}

    <script>
        const API_BASE = '';

        async function apiCall(url, options = {}) {
            const token = localStorage.getItem('token');
            const headers = { 'Content-Type': 'application/json', ...options.headers };
            if (token) headers['Authorization'] = `Bearer ${token}`;

            const response = await fetch(API_BASE + url, { ...options, headers });

            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/';
                return null;
            }

            return response;
        }

        async function apiGet(url) {
            const res = await apiCall(url);
            return res ? res.json() : null;
        }

        async function apiPost(url, data) {
            const res = await apiCall(url, { method: 'POST', body: JSON.stringify(data) });
            return res ? res.json() : null;
        }

        async function apiDelete(url) {
            const res = await apiCall(url, { method: 'DELETE' });
            return res ? res.json() : null;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600' };
            toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transition-opacity duration-300`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
