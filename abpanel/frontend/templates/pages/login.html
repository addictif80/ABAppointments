{% extends "partials/base.html" %}
{% block title %}ABPanel - Connexion{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-dark-950 px-4">
    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-600 rounded-2xl mb-4">
                <i class="fas fa-server text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">ABPanel</h1>
            <p class="text-gray-500 mt-1">Panneau de contrôle d'hébergement</p>
        </div>

        <!-- Login form -->
        <div class="bg-dark-900 rounded-xl border border-gray-800 p-8">
            <h2 class="text-xl font-semibold text-white mb-6">Connexion</h2>

            <div id="error-msg" class="hidden bg-red-900/30 border border-red-800 text-red-400 px-4 py-3 rounded-lg mb-4 text-sm"></div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Nom d'utilisateur</label>
                    <input type="text" id="username" required
                        class="w-full bg-dark-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition"
                        placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Mot de passe</label>
                    <input type="password" id="password" required
                        class="w-full bg-dark-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 focus:ring-1 focus:ring-primary-500 transition"
                        placeholder="********">
                </div>
                <button type="submit"
                    class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 rounded-lg transition-colors">
                    Se connecter
                </button>
            </form>
        </div>

        <p class="text-center text-gray-600 text-xs mt-6">ABPanel v1.0.0</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
        window.location.href = '/dashboard';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.classList.add('hidden');

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } else {
                errorMsg.textContent = data.detail || 'Identifiants invalides';
                errorMsg.classList.remove('hidden');
            }
        } catch (err) {
            errorMsg.textContent = 'Erreur de connexion au serveur';
            errorMsg.classList.remove('hidden');
        }
    });
</script>
{% endblock %}
