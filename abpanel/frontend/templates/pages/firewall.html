{% extends "partials/base.html" %}
{% block title %}ABPanel - Pare-feu{% endblock %}

{% block body %}
{% include "partials/sidebar.html" %}

<main class="lg:ml-64 p-6">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-white">Pare-feu (UFW)</h2>
    </div>

    <!-- Status -->
    <div class="bg-dark-900 rounded-xl border border-gray-800 p-5 mb-4">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Statut</h3>
        <pre id="fw-status" class="text-sm text-gray-300 font-mono whitespace-pre-wrap">Chargement...</pre>
    </div>

    <!-- Quick actions -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
        <div class="bg-dark-900 rounded-xl border border-gray-800 p-5">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Autoriser un port</h3>
            <div class="flex gap-2">
                <input type="number" id="allow-port" placeholder="Port" class="flex-1 bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary-500">
                <select id="allow-proto" class="bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm">
                    <option>tcp</option><option>udp</option>
                </select>
                <button onclick="allowPort()" class="bg-green-700 hover:bg-green-600 text-white text-sm px-4 py-2 rounded-lg">Autoriser</button>
            </div>
        </div>
        <div class="bg-dark-900 rounded-xl border border-gray-800 p-5">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Bloquer un port</h3>
            <div class="flex gap-2">
                <input type="number" id="deny-port" placeholder="Port" class="flex-1 bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-primary-500">
                <select id="deny-proto" class="bg-dark-800 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm">
                    <option>tcp</option><option>udp</option>
                </select>
                <button onclick="denyPort()" class="bg-red-700 hover:bg-red-600 text-white text-sm px-4 py-2 rounded-lg">Bloquer</button>
            </div>
        </div>
    </div>

    <!-- Rules -->
    <div class="bg-dark-900 rounded-xl border border-gray-800 p-5">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Règles actuelles</h3>
        <pre id="fw-rules" class="text-sm text-gray-300 font-mono whitespace-pre-wrap">Chargement...</pre>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script>
    async function loadFirewall() {
        const status = await apiGet('/api/firewall/status');
        document.getElementById('fw-status').textContent = status?.output || 'Impossible de charger le statut';

        const rules = await apiGet('/api/firewall/rules');
        document.getElementById('fw-rules').textContent = rules?.output || 'Aucune règle';
    }

    async function allowPort() {
        const port = document.getElementById('allow-port').value;
        const proto = document.getElementById('allow-proto').value;
        if (!port) return;
        const result = await apiPost('/api/firewall/allow-port', { port: parseInt(port), proto });
        showToast(result?.output || 'Règle ajoutée');
        loadFirewall();
    }

    async function denyPort() {
        const port = document.getElementById('deny-port').value;
        const proto = document.getElementById('deny-proto').value;
        if (!port) return;
        const result = await apiPost('/api/firewall/deny-port', { port: parseInt(port), proto });
        showToast(result?.output || 'Règle ajoutée');
        loadFirewall();
    }

    loadFirewall();
</script>
{% endblock %}
